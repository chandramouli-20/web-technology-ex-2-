<!DOCTYPE html>
<html>
<head>
<title>Educational Course Portal - Student Registration</title>

<style>
body{
    font-family:Arial;
    background:#f0f8ff;
}
h2{
    text-align:center;
    color:darkblue;
}
form{
    width:450px;
    margin:auto;
    background:white;
    padding:20px;
    border:1px solid gray;
    border-radius:10px;
}
input,select,textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:10px;
}
input[type=radio],
input[type=checkbox],
input[type=color],
input[type=range],
input[type=file]{
    width:auto;
}
input[type=submit],
input[type=reset]{
    width:120px;
    background:darkblue;
    color:white;
    border:none;
    cursor:pointer;
    padding:10px;
}
</style>

</head>

<body>

<h2>Educational Course Portal - Student Registration Form</h2>

<form>

<label>Student Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Email</label>
<input type="email" placeholder="example@gmail.com" required>

<label>Password</label>
<input type="password" placeholder="Enter Password" required>

<label>Age</label>
<input type="number" min="17" max="60" required>

<label>Date of Birth</label>
<input type="date">

<label>Gender</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
<br><br>

<label>Select Course</label>

<select required>
<option value="">--Choose Course--</option>
<option>B.Tech CSE</option>
<option>B.Tech AI & DS</option>
<option>B.Tech IT</option>
<option>B.Tech ECE</option>
<option>BCA</option>
</select>

<label>Skills</label><br>

<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> JavaScript
<input type="checkbox"> Python

<br><br>

<label>Address</label>

<textarea rows="4" placeholder="Enter your address"></textarea>

<label>Favorite Theme Color</label><br>

<input type="color">

<br><br>

<label>Upload ID Card / Resume</label><br>

<input type="file">

<br><br>

<label>Programming Skill Level</label><br>

<input type="range" min="0" max="100">

<br><br>

<label>Mobile Number</label>

<input type="text"
placeholder="10-digit Mobile Number"
pattern="[0-9]{10}"
required>

<input type="submit" value="Register">

<input type="reset" value="Clear">

</form>

</body>
</html>
